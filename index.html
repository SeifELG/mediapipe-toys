<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MediaPipe Toys - Hello World</title>
  </head>
  <body>
    <main id="app">
      <section class="shell" aria-label="MediaPipe face mesh hello world">
        <header class="topbar">
          <div>
            <p class="eyebrow">MediaPipe Toys</p>
            <h1>Hello World</h1>
          </div>
          <div class="topbar-actions">
            <span id="status">Ready</span>
            <button id="enable-camera" type="button">Enable camera</button>
          </div>
        </header>

        <nav class="tabs" id="tabs" aria-label="Toy picker"></nav>
        <div id="toy-root"></div>
        <div id="hidden-video-host" hidden></div>
      </section>
    </main>
    <script type="module" src="/src/main.ts"></script>
  </body>
